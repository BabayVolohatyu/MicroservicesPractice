services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/kafka/data
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  auth-api:
    build:
      context: .
      dockerfile: src/FinancialTracker.Auth.API/Dockerfile
    container_name: auth-api
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      JWT_SECRET: YourSuperSecretKeyForJwtTokensMustBeAtLeast32CharactersLong!
      JWT_ISSUER: FinancialTracker
      JWT_AUDIENCE: FinancialTracker
      JWT_EXPIRATION_HOURS: "24"
      AUTH_DB_CONNECTION_STRING: "Data Source=AuthDb;Mode=Memory;Cache=Shared"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  accounts-api:
    build:
      context: .
      dockerfile: src/FinancialTracker.Accounts.API/Dockerfile
    container_name: accounts-api
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      JWT_SECRET: YourSuperSecretKeyForJwtTokensMustBeAtLeast32CharactersLong!
      JWT_ISSUER: FinancialTracker
      JWT_AUDIENCE: FinancialTracker
      JWT_EXPIRATION_HOURS: "24"
      ACCOUNTS_DB_CONNECTION_STRING: "Data Source=AccountsDb;Mode=Memory;Cache=Shared"
      Kafka__BootstrapServers: kafka:9092
      Kafka__GroupId: accounts-service
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  transactions-api:
    build:
      context: .
      dockerfile: src/FinancialTracker.Transactions.API/Dockerfile
    container_name: transactions-api
    ports:
      - "5003:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      JWT_SECRET: YourSuperSecretKeyForJwtTokensMustBeAtLeast32CharactersLong!
      JWT_ISSUER: FinancialTracker
      JWT_AUDIENCE: FinancialTracker
      JWT_EXPIRATION_HOURS: "24"
      TRANSACTIONS_DB_CONNECTION_STRING: "Data Source=TransactionsDb;Mode=Memory;Cache=Shared"
      AccountsService__BaseUrl: http://accounts-api:8080
      Kafka__BootstrapServers: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
      accounts-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  kafka_data:
